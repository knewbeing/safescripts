name: Daily Copilot Tools Discovery - Update AI Tools

on:
  schedule:
    - cron: "0 2 * * *" # 每天 02:00 UTC 自动触发
  workflow_dispatch:
    inputs:
      repo_override:
        description: "调试用：只处理指定仓库（owner/repo），留空则处理全部。"
        required: false
        type: string

jobs:
  # ══════════════════════════════════════════════════════════════════
  # Job 1 · setup
  # 职责：读取 repos.json 中所有仓库，构建 matrix 供 run job 并行使用。
  # ══════════════════════════════════════════════════════════════════
  setup:
    name: Build repository matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}

    steps:
      - name: Checkout maintenance repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build matrix from repos.json
        id: pick
        env:
          REPO_OVERRIDE: ${{ inputs.repo_override }}
        run: python .github/scripts/pick_repo.py

  # ══════════════════════════════════════════════════════════════════
  # Job 2 · run  （matrix 并行，每个仓库独立运行）
  #
  # 7 步流水线：
  #   Step 1 · scan_trending.py
  #             抓取 GitHub Trending → 扫描工具文件 → 写入 /tmp/ai_tools/
  #             输出: has_candidates
  #
  #   Step 2 · actions/ai-inference (analyze-relevance)
  #             GPT-4.1-mini 判断哪些工具与目标仓库相关
  #             输出: response (JSON: {selected_ids, reason})
  #             仅在 has_candidates==true 时执行
  #
  #   Step 3 · install_selected.py
  #             读取 AI_ANALYSIS → 安装工具到 clone → 写 installed_tools.json
  #             输出: has_installed, branch_name, new_count, updated_count
  #
  #   Step 4 · actions/ai-inference (annotate-tools)        ← 新增
  #             GPT-4.1 对所有工具进行分类并生成中文注释元数据
  #             输出: response (JSON: {tools:[{path,category,zh_*}], category_order})
  #             仅在 has_installed==true 时执行
  #
  #   Step 5 · apply_annotations.py                         ← 新增
  #             将中文注释写入各工具文件 + 生成 .github/TOOLS_INDEX.md
  #             + 刷新 installed_tools.json 的 preview 字段
  #             仅在 has_installed==true 时执行
  #
  #   Step 6 · actions/ai-inference (generate-tools-readme)
  #             GPT-4.1 生成 COPILOT_TOOLS.md 完整使用说明
  #             仅在 has_installed==true 时执行
  #
  #   Step 7 · commit_pr.py
  #             写 COPILOT_TOOLS.md → commit → push → PR → auto-merge
  #             仅在 has_installed==true 时执行
  #
  # Token 注入链：
  #   GITHUB_TOKEN        → Actions 自动令牌，用于 Trending 抓取 + GitHub API 查询
  #   RESOLVED_ORG_TOKEN  → secrets[matrix.token_env_name]，跨 org PAT（clone/push/PR）
  #   TARGET_REPO_TOKEN   → 静态兜底 PAT（RESOLVED_ORG_TOKEN 为空时使用）
  #
  # AI 调用由 actions/ai-inference 原生处理（无需 COPILOT_TOKEN/MODELS_TOKEN）
  # ══════════════════════════════════════════════════════════════════
  run:
    name: "Update AI tools for ${{ matrix.repo }}"
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      # contents:read — GITHUB_TOKEN 只读（Trending API 查询）
      # models:read   — actions/ai-inference 需要此权限调用 GitHub Models
      contents: read
      models: read

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      # ─── 准备环境 ────────────────────────────────────────────────────────
      - name: Checkout maintenance repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r .github/scripts/requirements.txt

      # ─── Step 1: 抓取 Trending + 扫描工具 ───────────────────────────────
      - name: "① Scan GitHub Trending for Copilot tools"
        id: scan
        env:
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          RESOLVED_ORG_TOKEN:  ${{ secrets[matrix.token_env_name] }}
          TARGET_REPO_TOKEN:   ${{ secrets.TARGET_REPO_TOKEN }}
          TARGET_REPO:         ${{ matrix.repo }}
        run: python .github/scripts/scan_trending.py

      # ─── Step 2: AI 相关性分析 (actions/ai-inference) ───────────────────
      - name: "② AI relevance analysis (GPT-4.1-mini)"
        id: analyze
        if: steps.scan.outputs.has_candidates == 'true'
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4.1-mini
          prompt-file: .github/prompts/analyze-relevance.prompt.yml
          file_input: |
            candidates_json: /tmp/ai_tools/candidates.json
            target_repo_info: /tmp/ai_tools/target_repo_info.json

      # ─── Step 3: 安装工具到目标仓库 ─────────────────────────────────────
      - name: "③ Install selected tools into target repo"
        id: install
        env:
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          RESOLVED_ORG_TOKEN:  ${{ secrets[matrix.token_env_name] }}
          TARGET_REPO_TOKEN:   ${{ secrets.TARGET_REPO_TOKEN }}
          TARGET_REPO:         ${{ matrix.repo }}
          GITHUB_RUN_ID:       ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT:  ${{ github.run_attempt }}
          # steps.analyze がスキップされた場合は空文字列 → install_selected.py が兜底を使用
          AI_ANALYSIS:         ${{ steps.analyze.outputs.response }}
        run: python .github/scripts/install_selected.py

      # ─── Step 4: AI 整理分类 + 生成中文注释元数据 ──────────────────────
      - name: "④ AI organize categories & write Chinese annotations (GPT-4.1)"
        id: annotate
        if: steps.install.outputs.has_installed == 'true'
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4.1
          prompt-file: .github/prompts/annotate-tools.prompt.yml
          file_input: |
            installed_tools_json: /tmp/ai_tools/installed_tools.json

      # ─── Step 5: 应用中文注释 + 生成分类索引 TOOLS_INDEX.md ────────────
      - name: "⑤ Apply Chinese annotations & generate TOOLS_INDEX.md"
        if: steps.install.outputs.has_installed == 'true'
        env:
          AI_ANNOTATIONS: ${{ steps.annotate.outputs.response }}
        run: python .github/scripts/apply_annotations.py

      # ─── Step 6: AI 生成 COPILOT_TOOLS.md (actions/ai-inference) ────────
      - name: "⑥ AI generate COPILOT_TOOLS.md (GPT-4.1)"
        id: readme
        if: steps.install.outputs.has_installed == 'true'
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4.1
          prompt-file: .github/prompts/generate-tools-readme.prompt.yml
          file_input: |
            installed_tools_json: /tmp/ai_tools/installed_tools.json

      # ─── Step 7: Commit → Push → PR → Auto-merge ────────────────────────
      - name: "⑦ Commit, push PR and enable auto-merge"
        if: steps.install.outputs.has_installed == 'true'
        env:
          RESOLVED_ORG_TOKEN:   ${{ secrets[matrix.token_env_name] }}
          TARGET_REPO_TOKEN:    ${{ secrets.TARGET_REPO_TOKEN }}
          GITHUB_REPOSITORY:    ${{ github.repository }}
          # response-file の出力パス（Step 6 がスキップの場合は空文字列→兜底テンプレ使用）
          README_CONTENT_FILE:  ${{ steps.readme.outputs.response-file }}
        run: python .github/scripts/commit_pr.py

