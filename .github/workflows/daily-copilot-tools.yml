name: Daily Copilot Tools Discovery

on:
  schedule:
    - cron: "0 2 * * *" # Daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      repo_override:
        description: "Target repository (owner/repo). Skips round-robin selection."
        required: false
        type: string
      token_secret_override:
        description: "Secret name to use as token for repo_override (default: TARGET_REPO_TOKEN)."
        required: false
        type: string

jobs:
  discover-and-install:
    name: Discover & install Copilot tools
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout maintenance repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Run daily Copilot tools update
        env:
          # Auto-provided. Used for GitHub Models API (AI) and trending scrape.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # ── Per-repo tokens ──────────────────────────────────────────────
          # Each secret below corresponds to a "token_secret" value in repos.json.
          # Add one line here whenever you add a new token_secret in repos.json.
          # A PAT needs "repo" scope for the target org/account.
          #
          # Default token (used when no token_secret is specified in repos.json)
          TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
          # Additional org/account tokens:
          TOKEN_ANOTHER_ORG: ${{ secrets.TOKEN_ANOTHER_ORG }}
          TOKEN_SOME_USER:   ${{ secrets.TOKEN_SOME_USER }}
          # TOKEN_YET_ANOTHER: ${{ secrets.TOKEN_YET_ANOTHER }}

          # ── Manual-trigger overrides ─────────────────────────────────────
          REPO_OVERRIDE:         ${{ inputs.repo_override }}
          TOKEN_SECRET_OVERRIDE: ${{ inputs.token_secret_override }}
          GITHUB_REPOSITORY:     ${{ github.repository }}

        run: python .github/scripts/main.py



