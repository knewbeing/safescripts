name: Daily Copilot Tools Discovery - Update AI Tools

on:
  schedule:
    - cron: "0 2 * * *" # 每天 02:00 UTC 自动触发
  push:
    branches: [main]
    paths:
      - ".github/**"
  workflow_dispatch:
    inputs:
      repo_override:
        description: "调试用：只处理指定仓库（owner/repo），留空则处理全部。"
        required: false
        type: string

jobs:
  # ══════════════════════════════════════════════════════════════════
  # Job 1 · setup
  # 职责：读取 repos.json 中所有仓库，构建 matrix 供 run job 并行使用。
  # ══════════════════════════════════════════════════════════════════
  setup:
    name: Build repository matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}

    steps:
      - name: Checkout maintenance repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build matrix from repos.json
        id: pick
        env:
          REPO_OVERRIDE: ${{ inputs.repo_override }}
        run: python .github/scripts/pick_repo.py

  # ══════════════════════════════════════════════════════════════════
  # Job 2 · run  （matrix 并行，每个仓库独立运行）
  #
  # 9 步流水线：
  #   Step 1 · prepare_target_repo.py
  #             读取目标仓库元数据并写入 /tmp/ai_tools/target_repo_info.json
  #
  #   Step 2 · search_tool_repos.py
  #             Python 调用 GitHub Models，为目标库挑选候选 AI 工具仓库
  #             输出: response (JSON: {repos:[{full_name,reason}], strategy_summary})
  #
  #   Step 3 · scan_ai_candidates.py
  #             扫描 AI 返回的候选仓库中的工具文件 → 写入 /tmp/ai_tools/candidates.json
  #             输出: has_candidates
  #
  #   Step 4 · analyze_relevance.py
  #             Python 调用 GitHub Models 判断哪些工具与目标仓库相关
  #             输出: response (JSON: {selected_ids, reason})
  #             仅在 has_candidates==true 时执行
  #
  #   Step 5 · install_selected.py
  #             读取 AI_ANALYSIS → 安装工具到 clone → 写 installed_tools.json
  #             输出: has_installed, branch_name, new_count, updated_count
  #
  #   Step 6 · annotate_installed_tools.py
  #             Python 调用 GitHub Models 对所有工具进行分类并生成中文注释元数据
  #             输出: response_file（annotations.json）
  #             仅在 has_installed==true 时执行
  #
  #   Step 7 · apply_annotations.py
  #             将中文注释写入各工具文件 + 生成 .github/TOOLS_INDEX.md
  #             + 刷新 installed_tools.json 的 preview 字段
  #             仅在 has_installed==true 时执行
  #
  #   Step 8 · generate_tools_readme.py
  #             Python 调用 GitHub Models 生成 COPILOT_TOOLS.md 完整使用说明
  #             仅在 has_installed==true 时执行
  #
  #   Step 9 · commit_pr.py
  #             写 COPILOT_TOOLS.md → commit → push → PR → auto-merge
  #             仅在 has_installed==true 时执行
  #
  # Token 注入链：
  #   GITHUB_TOKEN        → Actions 自动令牌，用于 GitHub API 查询与工具扫描
  #   COPILOT_TOKEN       → GitHub Models PAT（可选，优先用于 Python AI 调用）
  #   MODELS_TOKEN        → GitHub Models PAT 兼容旧变量名（可选）
  #   RESOLVED_ORG_TOKEN  → secrets[matrix.token_env_name]，跨 org PAT（clone/push/PR）
  #   TARGET_REPO_TOKEN   → 静态兜底 PAT（RESOLVED_ORG_TOKEN 为空时使用）
  # ══════════════════════════════════════════════════════════════════
  run:
    name: "Update AI tools for ${{ matrix.repo }}"
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      # contents:read — GITHUB_TOKEN 只读（Trending API 查询）
      # models:read   — Python 脚本通过 GitHub Models API 调用模型时需要此权限
      contents: read
      models: read

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      # ─── 准备环境 ────────────────────────────────────────────────────────
      - name: Checkout maintenance repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r .github/scripts/requirements.txt

      # ─── Step 1: 准备目标库上下文 ────────────────────────────────────────
      - name: "① Prepare target repository context"
        id: prepare
        env:
          RESOLVED_ORG_TOKEN:  ${{ secrets[matrix.token_env_name] }}
          TARGET_REPO_TOKEN:   ${{ secrets.TARGET_REPO_TOKEN }}
          TARGET_REPO:         ${{ matrix.repo }}
        run: python .github/scripts/prepare_target_repo.py

      # ─── Step 2: Python + GitHub Models 主动搜索候选工具库 ──────────────
      - name: "② Search candidate tool repos with Python"
        id: repo_search
        env:
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          COPILOT_TOKEN:       ${{ secrets.COPILOT_TOKEN }}
          MODELS_TOKEN:        ${{ secrets.MODELS_TOKEN }}
        run: python .github/scripts/search_tool_repos.py

      # ─── Step 3: 扫描 AI 返回的候选仓库工具文件 ─────────────────────────
      - name: "③ Scan AI-selected tool repositories"
        id: scan
        env:
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          AI_REPO_SEARCH:      ${{ steps.repo_search.outcome == 'success' && steps.repo_search.outputs.response || '' }}
        run: python .github/scripts/scan_ai_candidates.py

      - name: "③.5 Debug AI model inputs"
        if: steps.scan.outputs.has_candidates == 'true'
        shell: bash
        run: |
          echo "repo=${{ matrix.repo }}"
          echo "event=${{ github.event_name }}"
          echo "actor=${{ github.actor }}"
          echo "ref=${{ github.ref }}"
          echo "repo_search_outcome=${{ steps.repo_search.outcome }}"
          echo "target_repo_info_exists=$(test -f /tmp/ai_tools/target_repo_info.json && echo yes || echo no)"
          echo "candidates_exists=$(test -f /tmp/ai_tools/candidates.json && echo yes || echo no)"
          echo "target_repo_info_bytes=$(wc -c < /tmp/ai_tools/target_repo_info.json 2>/dev/null || echo 0)"
          echo "candidates_bytes=$(wc -c < /tmp/ai_tools/candidates.json 2>/dev/null || echo 0)"
          echo "target_repo_info_preview=$(head -c 200 /tmp/ai_tools/target_repo_info.json 2>/dev/null || echo '(missing)')"
          echo "candidates_preview=$(head -c 200 /tmp/ai_tools/candidates.json 2>/dev/null || echo '(missing)')"
          echo "github_token_present=${{ secrets.GITHUB_TOKEN != '' }}"
          echo "target_repo_token_present=${{ secrets.TARGET_REPO_TOKEN != '' }}"

      # ─── Step 4: Python + GitHub Models 相关性分析 ──────────────────────
      - name: "④ Analyze relevance with Python"
        id: analyze
        if: steps.scan.outputs.has_candidates == 'true'
        env:
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          COPILOT_TOKEN:       ${{ secrets.COPILOT_TOKEN }}
          MODELS_TOKEN:        ${{ secrets.MODELS_TOKEN }}
        run: python .github/scripts/analyze_relevance.py

      - name: "④.5 Debug analyze result"
        if: steps.scan.outputs.has_candidates == 'true'
        shell: bash
        run: |
          echo "analyze_outcome=${{ steps.analyze.outcome }}"
          echo "has_candidates=${{ steps.scan.outputs.has_candidates }}"
          echo "model=openai/gpt-4.1-mini"
          echo "ai_analysis_present=$(test -f /tmp/ai_tools/ai_analysis.json && echo yes || echo no)"
          if [ -f /tmp/ai_tools/ai_analysis.json ]; then
            echo "ai_analysis_preview=$(head -c 200 /tmp/ai_tools/ai_analysis.json)"
          fi
          echo "candidates_count_hint=$(grep -o '\"repo\":' /tmp/ai_tools/candidates.json 2>/dev/null | wc -l || echo 0)"

      # ─── Step 5: 安装工具到目标仓库 ─────────────────────────────────────
      - name: "⑤ Install selected tools into target repo"
        id: install
        env:
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          RESOLVED_ORG_TOKEN:  ${{ secrets[matrix.token_env_name] }}
          TARGET_REPO_TOKEN:   ${{ secrets.TARGET_REPO_TOKEN }}
          TARGET_REPO:         ${{ matrix.repo }}
          GITHUB_RUN_ID:       ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT:  ${{ github.run_attempt }}
          AI_ANALYSIS:         ${{ steps.analyze.outputs.response }}
        run: python .github/scripts/install_selected.py

      # ─── Step 6: Python + GitHub Models 生成中文注释元数据 ──────────────
      - name: "⑥ Generate Chinese annotations with Python"
        id: annotate
        if: steps.install.outputs.has_installed == 'true'
        env:
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          COPILOT_TOKEN:       ${{ secrets.COPILOT_TOKEN }}
          MODELS_TOKEN:        ${{ secrets.MODELS_TOKEN }}
        run: python .github/scripts/annotate_installed_tools.py

      - name: "⑥.5 Debug annotation result"
        if: steps.install.outputs.has_installed == 'true'
        shell: bash
        run: |
          echo "annotate_outcome=${{ steps.annotate.outcome }}"
          echo "installed_tools_exists=$(test -f /tmp/ai_tools/installed_tools.json && echo yes || echo no)"
          echo "installed_tools_bytes=$(wc -c < /tmp/ai_tools/installed_tools.json 2>/dev/null || echo 0)"
          echo "annotations_present=$(test -f /tmp/ai_tools/annotations.json && echo yes || echo no)"
          if [ -f /tmp/ai_tools/annotations.json ]; then
            echo "annotations_preview=$(head -c 200 /tmp/ai_tools/annotations.json)"
          fi

      # ─── Step 7: 应用中文注释 + 生成分类索引 TOOLS_INDEX.md ────────────
      - name: "⑦ Apply Chinese annotations & generate TOOLS_INDEX.md"
        if: steps.install.outputs.has_installed == 'true'
        env:
          AI_ANNOTATIONS_FILE: ${{ steps.annotate.outputs.response_file }}
        run: python .github/scripts/apply_annotations.py

      # ─── Step 8: Python + GitHub Models 生成 COPILOT_TOOLS.md ──────────
      - name: "⑧ Generate COPILOT_TOOLS.md with Python"
        id: readme
        if: steps.install.outputs.has_installed == 'true'
        env:
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          COPILOT_TOKEN:       ${{ secrets.COPILOT_TOKEN }}
          MODELS_TOKEN:        ${{ secrets.MODELS_TOKEN }}
        run: python .github/scripts/generate_tools_readme.py

      - name: "⑧.5 Debug readme result"
        if: steps.install.outputs.has_installed == 'true'
        shell: bash
        run: |
          echo "readme_outcome=${{ steps.readme.outcome }}"
          echo "installed_tools_exists=$(test -f /tmp/ai_tools/installed_tools.json && echo yes || echo no)"
          echo "installed_tools_bytes=$(wc -c < /tmp/ai_tools/installed_tools.json 2>/dev/null || echo 0)"
          echo "readme_content_present=$(test -f /tmp/ai_tools/readme_content.md && echo yes || echo no)"

      # ─── Step 9: Commit → Push → PR → Auto-merge ────────────────────────
      - name: "⑨ Commit, push PR and enable auto-merge"
        if: steps.install.outputs.has_installed == 'true'
        env:
          RESOLVED_ORG_TOKEN:   ${{ secrets[matrix.token_env_name] }}
          TARGET_REPO_TOKEN:    ${{ secrets.TARGET_REPO_TOKEN }}
          GITHUB_REPOSITORY:    ${{ github.repository }}
          README_CONTENT_FILE:  ${{ steps.readme.outputs.response_file }}
        run: python .github/scripts/commit_pr.py

