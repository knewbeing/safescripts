name: Daily Copilot Tools Discovery

on:
  schedule:
    - cron: "0 2 * * *" # Daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      repo_override:
        description: "Target repository override (owner/repo). Skips round-robin selection."
        required: false
        type: string

jobs:
  discover-and-install:
    name: Discover & install Copilot tools
    runs-on: ubuntu-latest

    # This workflow only needs read access to THIS maintenance repo.
    # Write access to target repos is provided via TARGET_REPO_TOKEN.
    permissions:
      contents: read

    steps:
      - name: Checkout maintenance repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Run daily Copilot tools update
        env:
          # Used for GitHub Models API (AI analysis) and trending scrape fallback.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with `repo` scope for reading/writing to target repositories.
          # Required for cloning, pushing, and creating PRs in external repos.
          TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
          # Optional: override which repo to process this run.
          REPO_OVERRIDE: ${{ inputs.repo_override }}
          # Passed through so PR bodies can link back to this workflow.
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python .github/scripts/main.py
