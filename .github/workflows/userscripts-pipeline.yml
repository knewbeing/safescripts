name: UserScripts Pipeline

on:
  schedule:
    - cron: "0 2 * * *"   # 每天 02:00 UTC
  workflow_dispatch:
    inputs:
      skip_discovery:
        description: "跳过热门脚本发现步骤"
        required: false
        type: boolean
        default: false
      skip_security:
        description: "跳过安全分析步骤"
        required: false
        type: boolean
        default: false

# GitHub Pages 部署需要的权限
permissions:
  contents: write      # 提交生成的文档
  pages: write         # 部署到 GitHub Pages
  id-token: write      # OIDC token（deploy-pages 需要）
  models: read         # GitHub Models API

# 同一时间只允许一个 Pages 部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ══════════════════════════════════════════════════════════════════
  # Job 1 · 同步托管脚本 + 生成文档
  # ══════════════════════════════════════════════════════════════════
  sync-managed:
    name: "① Sync managed userscripts"
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.fetch.outputs.has_changes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openai pyyaml requests

      - name: "① Fetch managed scripts"
        id: fetch
        run: python scripts/fetch_managed_scripts.py

      - name: "② Summarize scripts (AI)"
        if: steps.fetch.outputs.has_changes == 'true'
        env:
          COPILOT_TOKEN:    ${{ secrets.COPILOT_TOKEN }}
          MODELS_TOKEN:     ${{ secrets.MODELS_TOKEN }}
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
        run: python scripts/summarize_userscript.py

      - name: "③ Generate index page"
        run: python scripts/generate_docs_index.py

      - name: Upload workspace
        uses: actions/upload-artifact@v4
        with:
          name: managed-workspace
          path: |
            userscripts/managed/
            docs/managed/
          retention-days: 1

  # ══════════════════════════════════════════════════════════════════
  # Job 2 · 安全分析（托管脚本）
  # ══════════════════════════════════════════════════════════════════
  security-managed:
    name: "② Security analysis (managed)"
    runs-on: ubuntu-latest
    needs: sync-managed
    if: ${{ !inputs.skip_security }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download managed workspace
        uses: actions/download-artifact@v4
        with:
          name: managed-workspace

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openai pyyaml

      - name: "④ Analyze security (managed)"
        continue-on-error: true
        env:
          MODE: managed
          COPILOT_TOKEN:  ${{ secrets.COPILOT_TOKEN }}
          MODELS_TOKEN:   ${{ secrets.MODELS_TOKEN }}
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/analyze_userscript_security.py

      - name: "⑤ Regenerate index (with security)"
        run: python scripts/generate_docs_index.py

      - name: Upload managed workspace (with security)
        uses: actions/upload-artifact@v4
        with:
          name: managed-workspace-secured
          path: |
            userscripts/managed/
            docs/managed/
          retention-days: 1

  # ══════════════════════════════════════════════════════════════════
  # Job 3 · 发现热门脚本
  # ══════════════════════════════════════════════════════════════════
  discover:
    name: "③ Discover popular scripts"
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_discovery }}
    outputs:
      has_changes: ${{ steps.discover.outputs.has_changes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openai pyyaml requests

      - name: "⑥ Discover popular userscripts"
        id: discover
        env:
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          COPILOT_TOKEN:  ${{ secrets.COPILOT_TOKEN }}
          MODELS_TOKEN:   ${{ secrets.MODELS_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
          MAX_DISCOVERED: "20"
        run: python scripts/discover_popular_scripts.py

      - name: Upload discovered workspace
        uses: actions/upload-artifact@v4
        with:
          name: discovered-workspace
          path: |
            userscripts/discovered/
            docs/discovered/
          retention-days: 1

  # ══════════════════════════════════════════════════════════════════
  # Job 4 · 安全分析（发现脚本）
  # ══════════════════════════════════════════════════════════════════
  security-discovered:
    name: "④ Security analysis (discovered)"
    runs-on: ubuntu-latest
    needs: discover
    if: ${{ !inputs.skip_security && !inputs.skip_discovery }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download discovered workspace
        uses: actions/download-artifact@v4
        with:
          name: discovered-workspace

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openai pyyaml

      - name: "⑦ Analyze security (discovered)"
        continue-on-error: true
        env:
          MODE: discovered
          COPILOT_TOKEN:  ${{ secrets.COPILOT_TOKEN }}
          MODELS_TOKEN:   ${{ secrets.MODELS_TOKEN }}
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/analyze_userscript_security.py

      - name: "⑧ Regenerate index (with security)"
        run: python scripts/generate_docs_index.py

      - name: Upload discovered workspace (with security)
        uses: actions/upload-artifact@v4
        with:
          name: discovered-workspace-secured
          path: |
            userscripts/discovered/
            docs/discovered/
          retention-days: 1

  # ══════════════════════════════════════════════════════════════════
  # Job 5 · 提交变更 + 构建 VitePress + 部署 GitHub Pages
  # ══════════════════════════════════════════════════════════════════
  build-and-deploy:
    name: "⑤ Build & Deploy"
    runs-on: ubuntu-latest
    needs: [security-managed, security-discovered]
    if: always()   # 即使前面某步 skip，也要执行部署

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download managed workspace (secured)
        id: dl-managed-secured
        uses: actions/download-artifact@v4
        with:
          name: managed-workspace-secured
          path: .
        continue-on-error: true

      - name: Download managed workspace (fallback)
        if: steps.dl-managed-secured.outcome == 'failure'
        uses: actions/download-artifact@v4
        with:
          name: managed-workspace
          path: .
        continue-on-error: true

      - name: Download discovered workspace (secured)
        id: dl-discovered-secured
        uses: actions/download-artifact@v4
        with:
          name: discovered-workspace-secured
          path: .
        continue-on-error: true

      - name: Download discovered workspace (fallback)
        if: steps.dl-discovered-secured.outcome == 'failure'
        uses: actions/download-artifact@v4
        with:
          name: discovered-workspace
          path: .
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate index pages
        run: python scripts/generate_docs_index.py

      - name: "⑨ Write run history (repo memory)"
        continue-on-error: true
        env:
          GITHUB_RUN_ID:     ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          pip install requests -q
          python scripts/write_run_history.py || true

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add userscripts/ docs/managed/ docs/discovered/ docs/status/ run-history.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync userscripts and update docs [skip ci]"
            git push
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install docs dependencies
        run: pnpm install

      - name: Build VitePress
        run: pnpm docs:build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
