name: Auto Merge Copilot PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto merge when checks pass
    runs-on: ubuntu-latest
    # 只处理 copilot/ 前缀分支
    if: |
      (github.event_name == 'pull_request' && startsWith(github.head_ref, 'copilot/')) ||
      (github.event_name == 'check_suite' && github.event.check_suite.conclusion == 'success')
    steps:
      - name: Enable auto-merge for Copilot PRs
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          # 将草稿转换为可审阅状态（如果是草稿）
          if [ "${{ github.event.pull_request.draft }}" = "true" ]; then
            gh pr ready "$PR_NUMBER" --repo "${{ github.repository }}" || true
          fi
          # 开启 auto-merge（所有 checks 通过后自动 squash-merge）
          gh pr merge "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --auto \
            --squash \
            --subject "chore: auto-merge Copilot PR #${PR_NUMBER}" \
            || echo "Auto-merge already enabled or failed – will retry on next push"

      - name: Trigger pipeline after merge (via check_suite)
        if: |
          github.event_name == 'check_suite' &&
          github.event.check_suite.conclusion == 'success' &&
          github.event.check_suite.head_branch == github.event.repository.default_branch
        run: echo "Pipeline will be triggered by UserScripts Pipeline schedule/dispatch"
