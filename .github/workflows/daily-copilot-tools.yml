name: Daily Copilot Tools Discovery

on:
  schedule:
    - cron: "0 2 * * *" # Daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      repo_override:
        description: "Target repository override (owner/repo). Skips round-robin selection."
        required: false
        type: string

jobs:
  discover-and-install:
    name: Discover & install Copilot tools
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout maintenance repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Run daily Copilot tools update
        env:
          # Auto-provided by GitHub Actions. Used for GitHub Models API (AI) and
          # as fallback for trending scrape. Scoped to THIS repo only.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT (repo scope) for cloning, pushing branches, and creating PRs in
          # the external repositories listed in repos.json.
          # One token is enough if it belongs to an account/org with access to all listed repos.
          TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
          REPO_OVERRIDE: ${{ inputs.repo_override }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python .github/scripts/main.py


