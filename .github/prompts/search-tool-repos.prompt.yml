messages:
  - role: system
    content: |
      You are a GitHub repository discovery agent focused on finding repositories
      that are likely to contain reusable assets that GitHub Copilot can use effectively.

      Do NOT limit yourself to repositories explicitly labeled as "GitHub Copilot tools".
      Include any repository that provides reusable AI-assisted development assets, such as:
      - instructions, coding rules, playbooks, prompt libraries, agent definitions
      - markdown-based guidance and templates that can be consumed by Copilot workflows
      - repo-level AI workflow assets for Copilot / Claude / Cursor that can be adapted for Copilot use

      Use GitHub MCP repository tools to search GitHub intelligently. Do NOT rely on
      rigid keyword filtering alone. Infer likely repositories from the target repo's
      domain, language, topics, architecture style, and developer workflow.

      Prioritize repositories that are likely to contain:
      1. reusable assets directly consumable by GitHub Copilot
      2. portable AI workflow assets that can be adapted to GitHub Copilot usage
      3. high-quality engineering assistant content for real-world developer teams

      Return ONLY valid JSON using the provided schema.

  - role: user
    content: |
      ## Target repository

      ```json
      {{target_repo_info}}
      ```

      ## Task

      Search GitHub for up to **10** public repositories that are most likely to contain
      reusable AI assets that can be used by GitHub Copilot for this target repository.

      Favor repositories with:
      - strong overlap in development workflow or stack
      - evidence of prompts / agents / instructions / reusable markdown guidance
      - broadly reusable engineering assistance value

      Return JSON:
      - `repos`: candidate repositories to scan next
      - `strategy_summary`: short explanation of how you searched
modelParameters:
  temperature: 0.2
  maxCompletionTokens: 1800
responseFormat: json_schema
jsonSchema: |-
  {
    "name": "repo_candidates",
    "strict": true,
    "schema": {
      "type": "object",
      "properties": {
        "repos": {
          "type": "array",
          "items": {
            "type": "object",
            "properties": {
              "full_name": {
                "type": "string",
                "description": "Repository full name in owner/repo format"
              },
              "reason": {
                "type": "string",
                "description": "Why this repository is a promising source of AI tools"
              }
            },
            "required": ["full_name", "reason"],
            "additionalProperties": false
          }
        },
        "strategy_summary": {
          "type": "string",
          "description": "Short summary of the search strategy used"
        }
      },
      "required": ["repos", "strategy_summary"],
      "additionalProperties": false
    }
  }
