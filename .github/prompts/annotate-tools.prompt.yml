messages:
  - role: system
    content: |
      你是一位 GitHub Copilot 工具管理专家，擅长对 Copilot 工具文件进行分类整理和中文注释撰写。

      你的任务是：
      1. 将工具按功能分类（使用下方的分类体系）
      2. 为每个工具撰写简洁的中文说明（包括功能描述、使用方式和标签）
      3. 确定合理的分类顺序

      **工具分类体系**（按优先级排序，不符合前面类别的归入最后一个）：
      - 编码规范    — 通用或特定语言的编码风格/最佳实践指令
      - 代码审查    — 代码检视、质量分析、Bug 排查类工具
      - 代码重构    — 重构建议、代码优化类工具
      - 测试辅助    — 单元测试、集成测试生成与分析
      - 文档生成    — API 文档、注释生成类工具
      - 安全审计    — 安全漏洞检查、敏感信息扫描
      - 架构设计    — 系统设计、架构决策辅助类 Agent
      - 任务规划    — 需求拆解、项目规划类 Agent 或提示词
      - 通用助手    — 通用型工具，不明确属于以上任何类别

      **中文注释原则**：
      - zh_name：工具的简洁中文名（不超过 10 个字）
      - zh_description：1~2 句话说明功能，以动词开头（如"帮助……"、"用于……"）
      - zh_usage：在 VS Code 或 GitHub 中如何调用（具体的快捷键 / 命令）
      - zh_tags：2~5 个中文关键词标签

      输出严格遵守 JSON schema，不要输出其他内容。

  - role: user
    content: |
      ## 当前目标仓库中所有已安装的 Copilot 工具

      ```json
      {{installed_tools_json}}
      ```

      字段说明：
      - `all_tools[*].name`    — 工具英文标识符（文件名去扩展名）
      - `all_tools[*].type`    — 工具类型：`instruction` | `agent` | `skill`
      - `all_tools[*].path`    — 相对于仓库根目录的文件路径
      - `all_tools[*].preview` — 文件前 800 字符（含 frontmatter）

      请对每个工具完成分类和中文注释，并给出最终的 `category_order`（去重后的分类顺序列表）。
modelParameters:
  temperature: 0.2
  maxCompletionTokens: 4000
responseFormat: json_schema
jsonSchema: |-
  {
    "name": "tool_annotations",
    "strict": true,
    "schema": {
      "type": "object",
      "properties": {
        "tools": {
          "type": "array",
          "description": "每个工具的中文注释元数据",
          "items": {
            "type": "object",
            "properties": {
              "path": {
                "type": "string",
                "description": "工具文件路径（与 all_tools[*].path 一致）"
              },
              "category": {
                "type": "string",
                "description": "所属中文分类名"
              },
              "zh_name": {
                "type": "string",
                "description": "工具中文简称（≤10 字）"
              },
              "zh_description": {
                "type": "string",
                "description": "功能说明（1~2 句，以动词开头）"
              },
              "zh_usage": {
                "type": "string",
                "description": "在 VS Code / GitHub 中的具体调用方式"
              },
              "zh_tags": {
                "type": "array",
                "items": { "type": "string" },
                "description": "2~5 个关键词标签"
              }
            },
            "required": ["path", "category", "zh_name", "zh_description", "zh_usage", "zh_tags"],
            "additionalProperties": false
          }
        },
        "category_order": {
          "type": "array",
          "items": { "type": "string" },
          "description": "所有分类的排列顺序（从高优先级到低）"
        }
      },
      "required": ["tools", "category_order"],
      "additionalProperties": false
    }
  }
