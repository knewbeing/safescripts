name: Daily Copilot Tools Discovery

on:
  schedule:
    - cron: "0 2 * * *" # 每天 02:00 UTC 自动触发
  workflow_dispatch:
    inputs:
      repo_override:
        description: "调试用：只处理指定仓库（owner/repo），留空则处理全部。"
        required: false
        type: string

jobs:
  # ══════════════════════════════════════════════════════════════════
  # Job 1 · setup
  # 职责：读取 repos.json 中所有仓库，构建 matrix 供 run job 并行使用。
  #
  # 调用链：
  #   pick_repo.py 读取 repos.json 的全部仓库列表
  #     → 为每个仓库推导 token_env_name（如 ANOTHER_ORG_GITHUB_TOKEN）
  #     → 序列化为 JSON 数组写入 GITHUB_OUTPUT（变量名 matrix）
  #   outputs.matrix 被 run job 的 strategy.matrix 消费
  #   → run job 为每个仓库并行启动一个独立的 runner
  # ══════════════════════════════════════════════════════════════════
  setup:
    name: Build repository matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      # JSON 数组，格式：[{"repo":"org/name","token_env_name":"ORG_GITHUB_TOKEN"},...]
      matrix: ${{ steps.pick.outputs.matrix }}

    steps:
      - name: Checkout maintenance repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build matrix from repos.json
        id: pick
        env:
          # 手动触发时可通过此变量只处理单个仓库（调试用）
          REPO_OVERRIDE: ${{ inputs.repo_override }}
        run: python .github/scripts/pick_repo.py

  # ══════════════════════════════════════════════════════════════════
  # Job 2 · run  （matrix 并行，每个仓库独立运行）
  # 职责：为 matrix 中的每个仓库执行完整的工具发现、安装、提 PR 流水线。
  #
  # 环境变量注入链：
  #   GITHUB_TOKEN        → GitHub Actions 自动注入的临时安装令牌
  #                         作用域仅限本维护仓库，无法访问任何外部仓库
  #                         用途1：Trending 抓取兜底（GitHub Search API，只读）
  #                         用途2：GitHub Models API（默认 AI 通道）
  #                                需要 run job 申请 models: read 权限
  #
  #   COPILOT_TOKEN       → （可选）GitHub Models 的 PAT 兜底（推荐 secret 名）
  #                         端点：https://models.github.ai/inference
  #                         要求：PAT 具备 models:read（fine-grained）或等效权限
  #                         说明：若为空，main.py 自动回退使用 GITHUB_TOKEN
  #   MODELS_TOKEN        → 兼容旧配置（与 COPILOT_TOKEN 等价）
  #
  #   RESOLVED_ORG_TOKEN  → secrets[matrix.token_env_name]（动态 secret 查找）
  #                         token_env_name 由 pick_repo.py 推导：
  #                           "another-org/repo" → ANOTHER_ORG_GITHUB_TOKEN
  #                         用途：clone/push/PR 目标仓库（任何外部仓库都需要 PAT）
  #                         若该 secret 未注册，值为空字符串，降级到 TARGET_REPO_TOKEN
  #
  #   TARGET_REPO_TOKEN   → secrets.TARGET_REPO_TOKEN（静态兜底 PAT）
  #                         RESOLVED_ORG_TOKEN 为空时使用
  #
  #   TARGET_REPO         → matrix.repo（当前处理的仓库，每个并行 runner 不同）
  #
  #   GITHUB_REPOSITORY   → github.repository（本维护仓库名，用于 PR 描述来源链接）
  # ══════════════════════════════════════════════════════════════════
  run:
    name: "Process ${{ matrix.repo }}"
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      # GITHUB_TOKEN 仅用于只读操作（Trending / GitHub API 查询 / GitHub Models）
      # 写操作（clone/push/PR）全部由 PAT（RESOLVED_ORG_TOKEN / TARGET_REPO_TOKEN）完成
      contents: read
      models: read

    strategy:
      # 每个仓库独立运行，某个仓库失败不影响其他仓库继续执行
      fail-fast: false
      matrix:
        # fromJson 将 setup job 输出的 JSON 字符串还原为数组
        # GitHub Actions 会为数组中的每个元素并行启动一个 runner
        include: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout maintenance repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Run Copilot tools update for ${{ matrix.repo }}
        env:
          # GITHUB_TOKEN 用于：
          #   1) Trending 抓取兜底（GitHub Search API）
          #   2) GitHub Models API（默认 AI 通道，需上方声明 models: read）
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          # COPILOT_TOKEN（可选，推荐）：GitHub Models API 的 PAT 兜底
          # MODELS_TOKEN（可选，兼容旧配置）：与 COPILOT_TOKEN 等价
          # 两者都为空时 main.py 自动使用 GITHUB_TOKEN
          COPILOT_TOKEN:       ${{ secrets.COPILOT_TOKEN }}
          MODELS_TOKEN:        ${{ secrets.MODELS_TOKEN }}
          # 动态读取本 matrix item 对应 org 的 secret（由 pick_repo.py 推导名称）
          # 跨 org/user 时用于 clone/push/PR
          RESOLVED_ORG_TOKEN:  ${{ secrets[matrix.token_env_name] }}
          # 兜底 token，RESOLVED_ORG_TOKEN 为空时使用
          TARGET_REPO_TOKEN:   ${{ secrets.TARGET_REPO_TOKEN }}
          # 当前处理的目标仓库（由 matrix 注入，每个 runner 值不同）
          TARGET_REPO:         ${{ matrix.repo }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
        run: python .github/scripts/main.py

