name: Daily Copilot Tools Discovery

on:
  schedule:
    - cron: "0 2 * * *" # Daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      repo_override:
        description: "Target repository (owner/repo). Skips round-robin selection."
        required: false
        type: string

jobs:
  discover-and-install:
    name: Discover & install Copilot tools
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout maintenance repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Run daily Copilot tools update
        env:
          # Auto-provided. Used for GitHub Models API (AI) and trending scrape.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # ── Token convention: <ORG>_GITHUB_TOKEN ────────────────────────
          # For each org/user in repos.json, create a secret named:
          #   <ORG_OR_USER>_GITHUB_TOKEN  (uppercase, hyphens → underscores)
          # Then declare it here. The code auto-derives the name from the repo owner.
          #
          # Examples:
          #   repo "your-org/x"    → secret YOUR_ORG_GITHUB_TOKEN
          #   repo "some-user/y"   → secret SOME_USER_GITHUB_TOKEN
          #
          # Fallback (when no org-specific secret exists):
          TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
          #
          # Add your org tokens below:
          YOUR_ORG_GITHUB_TOKEN:     ${{ secrets.YOUR_ORG_GITHUB_TOKEN }}
          ANOTHER_ORG_GITHUB_TOKEN:  ${{ secrets.ANOTHER_ORG_GITHUB_TOKEN }}
          SOME_USER_GITHUB_TOKEN:    ${{ secrets.SOME_USER_GITHUB_TOKEN }}
          # NEXT_ORG_GITHUB_TOKEN:   ${{ secrets.NEXT_ORG_GITHUB_TOKEN }}

          REPO_OVERRIDE:         ${{ inputs.repo_override }}
          GITHUB_REPOSITORY:     ${{ github.repository }}

        run: python .github/scripts/main.py




